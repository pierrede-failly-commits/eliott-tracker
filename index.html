<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eliott Tracker 🎯</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .card { background: #1e293b; border-radius: 20px; padding: 20px; border: 1px solid #334155; margin-bottom: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .hidden { display: none !important; }
        .btn-primary { background: #3b82f6; width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; transition: all 0.2s; text-transform: uppercase; }
        .btn-primary:active { transform: scale(0.95); }
        input[type="time"], input[type="number"] { background: #0f172a !important; border: 1px solid #334155 !important; color: white !important; outline: none; }
        input[type="checkbox"] { width: 24px; height: 24px; accent-color: #3b82f6; }
        .btn-flash { background: #ef4444; width: 100%; padding: 25px; border-radius: 20px; font-weight: 900; font-size: 1.5rem; text-transform: uppercase; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
        .pari-tag { font-size: 0.75rem; padding: 3px 6px; border-radius: 6px; background: #334155; color: #cbd5e1; }
    </style>
</head>
<body class="p-4">

    <div id="setup-screen" class="card mt-10 hidden">
        <h2 class="text-2xl font-black mb-4 text-center text-blue-400">NOUVELLE SESSION</h2>
        <p class="text-center text-gray-400 text-sm mb-4">À quelle heure est le rendez-vous ?</p>
        <input type="time" id="new-target-time" class="w-full p-4 rounded-xl text-4xl mb-6 text-center font-mono">
        
        <label class="flex items-center justify-center gap-3 mb-6 p-4 bg-slate-800 rounded-xl border border-dashed border-slate-600">
            <span class="font-bold text-orange-400 uppercase text-sm">🚨 Risque de Lapin ?</span>
            <input type="checkbox" id="check-lapin-setup">
        </label>
        
        <button onclick="setGlobalTime()" id="btn-set-time" class="btn-primary bg-green-600 text-lg">Ouvrir les paris</button>
        <div class="leaderboard-section mt-8"></div>
    </div>

    <div id="login-screen" class="card mt-10 hidden text-center">
        <h2 class="text-2xl font-black mb-6 text-blue-400 uppercase italic">Qui es-tu ?</h2>
        <div id="user-list" class="grid grid-cols-2 gap-3 mb-8"></div>
        <button onclick="resetHoraireForce()" class="text-xs text-red-500/50 uppercase font-bold tracking-widest underline">Annuler la session</button>
        <div class="leaderboard-section mt-8"></div>
    </div>

    <div id="main-screen" class="hidden">
        <header class="flex justify-between items-start mb-6">
            <div>
                <h1 id="welcome-msg" class="text-xl font-black text-blue-400 italic">...</h1>
                <p id="user-balance" class="text-yellow-400 font-mono text-2xl font-bold">0 EC</p>
            </div>
            <div class="flex flex-col items-end gap-2">
                <button onclick="logout()" class="text-[10px] bg-slate-800 px-3 py-2 rounded-lg border border-slate-700 font-bold uppercase">Quitter</button>
                <div id="lapin-alert" class="hidden bg-orange-500/20 text-orange-500 text-[10px] px-2 py-1 rounded border border-orange-500/50 font-bold uppercase animate-pulse">⚠️ Option Lapin</div>
            </div>
        </header>

        <div class="text-center mb-8">
            <div id="chrono" class="text-6xl font-mono font-black text-red-500 tracking-tighter">00:00:00</div>
            <p id="display-target" class="text-gray-400 font-bold uppercase text-xs mt-2 tracking-widest">Cible : --:--</p>
        </div>

        <div id="bet-zone" class="card border-blue-500/30 hidden">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="text-[10px] text-gray-500 font-black uppercase mb-1 block">Mise (EC)</label>
                    <input type="number" id="bet-amount" class="w-full p-4 rounded-xl font-mono text-xl text-center" value="10">
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 font-black uppercase mb-1 block">Prono (Min)</label>
                    <input type="number" id="bet-time" class="w-full p-4 rounded-xl font-mono text-xl text-center" value="15">
                </div>
            </div>
            
            <div class="space-y-4 text-sm bg-slate-900/80 p-5 rounded-xl mb-6">
                <label class="flex justify-between items-center font-bold"><span>🦄 Objet Random</span> <input type="checkbox" id="bet-objet"></label>
                <label class="flex justify-between items-center font-bold"><span>🔋 Batterie &lt; 5%</span> <input type="checkbox" id="bet-batterie"></label>
                <label class="flex justify-between items-center font-bold"><span>🌅 Prop. Lever soleil</span> <input type="checkbox" id="bet-soleil"></label>
                <label class="flex justify-between items-center font-bold"><span>📩 SMS départ à l'heure</span> <input type="checkbox" id="bet-sms"></label>
            </div>
            <button onclick="submitPari()" class="btn-primary bg-blue-600 shadow-lg shadow-blue-500/20">Valider mon pari</button>
        </div>

        <div id="flash-container" class="hidden space-y-4 mb-8">
            <button onclick="showConstat()" class="btn-flash active:scale-95 transition-transform">📸 ELIOTT FLASHÉ</button>
            <button onclick="confirmAbsent()" class="w-full py-4 rounded-xl border-2 border-slate-700 bg-slate-800 text-slate-400 font-bold uppercase text-sm active:bg-slate-700">❌ Eliott Absent (Lapin)</button>
        </div>

        <div id="constat-zone" class="card border-red-500 bg-red-900/10 hidden">
            <h3 class="text-center font-black text-red-500 mb-2 uppercase text-xl">Validation Officielle</h3>
            <p class="text-xs text-gray-400 text-center mb-6">Que s'est-il réellement passé ?</p>
            <div class="space-y-4 mb-6 text-sm">
                <label class="flex justify-between items-center bg-slate-900 p-4 rounded-xl font-bold border border-slate-700">Objet random présent ? <input type="checkbox" id="real-objet"></label>
                <label class="flex justify-between items-center bg-slate-900 p-4 rounded-xl font-bold border border-slate-700">Batterie &lt; 5% ? <input type="checkbox" id="real-batterie"></label>
                <label class="flex justify-between items-center bg-slate-900 p-4 rounded-xl font-bold border border-slate-700">A proposé le lever soleil ? <input type="checkbox" id="real-soleil"></label>
                <label class="flex justify-between items-center bg-slate-900 p-4 rounded-xl font-bold border border-slate-700">SMS de départ à l'heure ? <input type="checkbox" id="real-sms"></label>
            </div>
            <button onclick="triggerFinalCalcul()" id="btn-encaissement" class="btn-primary bg-red-600 text-lg">ENCAISSER LES POINTS 💸</button>
        </div>

        <div class="leaderboard-section mt-4"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpl3XzsnI6Itv_UgDNkclDAfG0rR6NtU8",
            authDomain: "eliottpari-f9c2b.firebaseapp.com",
            databaseURL: "https://eliottpari-f9c2b-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "eliottpari-f9c2b",
            storageBucket: "eliottpari-f9c2b.firebasestorage.app",
            messagingSenderId: "625039205772",
            appId: "1:625039205772:web:58313d4d6e7864f6ab62a9",
            measurementId: "G-QV3VMLF39J"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        

        // ---- ÉTAT GLOBAL ----
        const potes = ["Pierre", "Charles", "Abel", "Titouan", "Guillaume"];
        const state = {
            horaire: "",
            lapin: false,
            scores: {},      // { Pierre: { score, pari_min, pari_mise, pari_events }, ... }
            user: localStorage.getItem('eliott_user') || "",
            constatVisible: false,
        };

        // ---- LISTENERS FIREBASE ----
        // Les deux listeners mettent à jour state et appellent render()

        onValue(ref(db, 'config'), (snap) => {
            const c = snap.val() || {};
            state.horaire = c.horaire || "";
            state.lapin   = c.lapin === "OUI";
            render();
        });

        onValue(ref(db, 'scores'), (snap) => {
            state.scores = snap.val() || {};
            render();
        });

        // ---- RENDER UNIQUE ----
        // Appelé à chaque changement d'état. Lit state, décide tout.

        function render() {
            const { horaire, lapin, scores, user, constatVisible } = state;
            const players = Object.entries(scores).map(([nom, v]) => ({ nom, ...v }));
            const me = players.find(p => p.nom === user);
            const myBetPlaced = me && me.pari_mise && me.pari_mise !== "" && me.pari_mise !== "0";

            // -- Écrans principaux --
            show('setup-screen',  !horaire);
            show('login-screen',  !!horaire && !user);
            show('main-screen',   !!horaire && !!user);

            // -- Setup screen : liste des potes --
            if (!user) {
                const list = document.getElementById('user-list');
                if (list.innerHTML === "") {
                    potes.forEach(p => {
                        const b = document.createElement('button');
                        b.className = "bg-slate-700 py-4 rounded-xl font-bold uppercase text-sm active:bg-blue-600 transition-colors";
                        b.innerText = p;
                        b.onclick = () => { state.user = p; localStorage.setItem('eliott_user', p); render(); };
                        list.appendChild(b);
                    });
                }
            }

            // -- Main screen --
            if (horaire && user) {
                document.getElementById('welcome-msg').innerText = "Salut " + user;
                document.getElementById('user-balance').innerText = (me && me.score !== undefined ? me.score : 0) + " EC";
                document.getElementById('display-target').innerText = "Cible : " + horaire;
                show('lapin-alert', lapin);

                // Zones de pari / flash / constat
                show('bet-zone',       !myBetPlaced && !constatVisible);
                show('flash-container', !!myBetPlaced && !constatVisible);
                show('constat-zone',    constatVisible);
            }

            // -- Leaderboard (affiché partout) --
            const lb = `
                <div class="mt-2">
                    <h3 class="text-[10px] font-black text-gray-500 uppercase mb-4 tracking-widest text-center">🏆 Espionnage des Paris</h3>
                    <div class="space-y-3">
                        ${players.sort((a,b) => (b.score||0)-(a.score||0)).map(d => {
                            const hasBet = d.pari_mise && d.pari_mise !== "0" && d.pari_mise !== "";
                            return `
                            <div class="bg-slate-800/40 p-3 rounded-xl border border-slate-700/50">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="font-bold text-slate-200">${d.nom}</span>
                                    <span class="font-mono text-blue-400 font-bold">${d.score !== undefined ? d.score : 0} EC</span>
                                </div>
                                ${hasBet
                                    ? `<div class="flex flex-wrap gap-2 items-center bg-slate-900/50 p-2 rounded-lg">
                                        <span class="text-xs text-green-400 font-bold">${d.pari_mise} EC sur ${d.pari_min} min</span>
                                        ${d.pari_events ? d.pari_events.split(',').map(e => `<span class="pari-tag">${e}</span>`).join('') : ''}
                                       </div>`
                                    : `<div class="text-[10px] text-slate-500 italic bg-slate-900/30 p-2 rounded-lg">En pleine réflexion...</div>`
                                }
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
            document.querySelectorAll('.leaderboard-section').forEach(el => el.innerHTML = lb);
        }

        function show(id, visible) {
            document.getElementById(id).classList.toggle('hidden', !visible);
        }

        // ---- ACTIONS ----

        async function setGlobalTime() {
            const t = document.getElementById('new-target-time').value;
            if (!t) return alert("Choisis une heure !");
            document.getElementById('btn-set-time').innerText = "Lancement...";
            const lapin = document.getElementById('check-lapin-setup').checked ? "OUI" : "NON";
            await update(ref(db, 'config'), { horaire: t, lapin });
        }

        async function submitPari() {
            const { user } = state;
            const mise = document.getElementById('bet-amount').value;
            const min  = document.getElementById('bet-time').value;
            const events = [];
            if (document.getElementById('bet-objet').checked)    events.push('🦄');
            if (document.getElementById('bet-batterie').checked)  events.push('🔋');
            if (document.getElementById('bet-soleil').checked)    events.push('🌅');
            if (document.getElementById('bet-sms').checked)       events.push('📩');
            await update(ref(db, `scores/${user}`), { pari_min: min, pari_mise: mise, pari_events: events.join(',') });
        }

        function showConstat() {
            state.constatVisible = true;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function confirmAbsent() {
            if (!confirm("Es-tu sûr ? Session annulée pour tout le monde.")) return;
            await update(ref(db, 'config'), { horaire: "", lapin: "" });
            alert("Session annulée. Eliott est officiellement un lapin. 🐰");
        }

        async function triggerFinalCalcul() {
            document.getElementById('btn-encaissement').innerText = "CALCUL EN COURS...";
            document.getElementById('btn-encaissement').disabled = true;

            const { user, horaire } = state;
            const snap = await get(ref(db, 'scores'));
            const mainData = snap.val() || {};

            const now = new Date();
            const [h, m] = horaire.split(':');
            const target = new Date(); target.setHours(h, m, 0, 0);
            const retardReel = Math.floor((now - target) / 60000);

            const updates = {};
            for (const [nom, player] of Object.entries(mainData)) {
                if (!player.pari_mise || player.pari_mise == "0" || player.pari_mise == "") continue;
                let multiBonus = 1;
                const ev = player.pari_events || "";
                if (ev.includes('🦄') && document.getElementById('real-objet').checked)    multiBonus *= 3.0;
                if (ev.includes('🔋') && document.getElementById('real-batterie').checked)  multiBonus *= 1.5;
                if (ev.includes('🌅') && document.getElementById('real-soleil').checked)    multiBonus *= 5.0;
                if (ev.includes('📩') && document.getElementById('real-sms').checked)       multiBonus *= 1.2;
                const ecart = Math.abs(retardReel - parseInt(player.pari_min));
                let multiPreci = 0;
                if (ecart === 0) multiPreci = 5;
                else if (ecart <= 5) multiPreci = 2;
                else if (ecart <= 10) multiPreci = 1.2;
                const gain = Math.floor(parseInt(player.pari_mise) * multiPreci * multiBonus);
                const nouveauSolde = parseInt(player.score || 0) - parseInt(player.pari_mise) + gain;
                updates[`scores/${nom}/score`]       = nouveauSolde;
                updates[`scores/${nom}/pari_min`]    = "";
                updates[`scores/${nom}/pari_mise`]   = "";
                updates[`scores/${nom}/pari_events`] = "";
                if (nom === user && ecart === 0) confetti({ particleCount: 200, spread: 90 });
            }
            updates['config/horaire'] = "";
            updates['config/lapin']   = "";
            await update(ref(db), updates);
            state.constatVisible = false;
            alert("Tous les gains ont été distribués !");
        }

        async function resetHoraireForce() {
            if (!confirm("Annuler la session pour tout le monde ?")) return;
            await update(ref(db, 'config'), { horaire: "", lapin: "" });
        }

        function logout() {
            state.user = "";
            state.constatVisible = false;
            localStorage.removeItem('eliott_user');
            document.getElementById('user-list').innerHTML = '';
            render();
        }

        // ---- CHRONO ----
        setInterval(() => {
            if (!state.horaire) return;
            const now = new Date();
            const [h, m] = state.horaire.split(':');
            const target = new Date(); target.setHours(h, m, 0, 0);
            const diff = now - target;
            const sign = diff >= 0 ? "+" : "-";
            const abs = new Date(Math.abs(diff));
            const el = document.getElementById('chrono');
            if (el) el.innerText = sign + abs.toISOString().substr(11, 8);
        }, 1000);

        // ---- EXPOSER AU HTML ----
        window.setGlobalTime     = setGlobalTime;
        window.submitPari        = submitPari;
        window.showConstat       = showConstat;
        window.confirmAbsent     = confirmAbsent;
        window.triggerFinalCalcul = triggerFinalCalcul;
        window.resetHoraireForce = resetHoraireForce;
        window.logout            = logout;
    </script>
</body>
</html>
